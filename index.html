    <style>
        * {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        :root {
            --primary-cyan: #00d9ff;
            --primary-green: #00ff88;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-subtle: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 217, 255, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(168, 85, 247, 0.1), transparent),
                radial-gradient(ellipse 50% 30% at 10% 80%, rgba(0, 255, 136, 0.08), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--primary-green) 50%, var(--primary-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradient-shift 4s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.5s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 217, 255, 0.25);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 217, 255, 0.1);
        }

        .platform-icon {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            font-size: 26px;
            position: relative;
        }

        .platform-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-green));
            z-index: -1;
            opacity: 0.5;
            filter: blur(8px);
        }

        .android-icon {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            color: #3ddc84;
        }

        .windows-icon {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            color: #00a1f1;
        }

        .macos-icon {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            color: #a8a8a8;
        }

        .linux-icon {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            color: #fb9b14;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--primary-green) 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.35);
        }

        .mirror-badge {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(254, 202, 87, 0.2) 100%);
            border: 1px solid rgba(255, 107, 107, 0.3);
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            color: #ff6b6b;
        }

        .recommended-badge {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(34, 197, 94, 0.2) 100%);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #10b981;
            font-size: 10px;
            font-weight: 600;
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary-cyan);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .section-title {
            position: relative;
            display: inline-block;
            font-weight: 700;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-cyan), var(--primary-green));
            border-radius: 2px;
        }

        .arch-tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.25);
            color: var(--primary-cyan);
            font-weight: 500;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .refresh-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary-cyan), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .refresh-btn:hover {
            border-color: var(--primary-cyan);
            transform: scale(1.05);
        }

        .refresh-btn:hover::before {
            opacity: 0.1;
        }

        .telegram-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: linear-gradient(135deg, #229ED9 0%, #0088cc 100%);
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 
                0 10px 30px rgba(34, 158, 217, 0.4),
                0 0 0 0 rgba(34, 158, 217, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 
                    0 10px 30px rgba(34, 158, 217, 0.4),
                    0 0 0 0 rgba(34, 158, 217, 0.5);
            }
            50% {
                box-shadow: 
                    0 10px 30px rgba(34, 158, 217, 0.4),
                    0 0 0 15px rgba(34, 158, 217, 0);
            }
        }

        .telegram-float:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 
                0 20px 40px rgba(34, 158, 217, 0.5),
                0 0 0 0 rgba(34, 158, 217, 0.5);
            animation: none;
        }

        .telegram-float .telegram-icon {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .telegram-tooltip {
            position: absolute;
            right: calc(100% + 15px);
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .telegram-float:hover .telegram-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .hero-glow {
            position: relative;
        }

        .hero-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-cyan);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .original-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        .original-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .version-badge {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #a855f7;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .platform-section {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .platform-section:nth-child(1) { animation-delay: 0.1s; }
        .platform-section:nth-child(2) { animation-delay: 0.2s; }
        .platform-section:nth-child(3) { animation-delay: 0.3s; }
        .platform-section:nth-child(4) { animation-delay: 0.4s; }

        .highlight-platform {
            position: relative;
        }

        .highlight-platform::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 60%;
            background: linear-gradient(180deg, var(--primary-cyan), var(--primary-green));
            border-radius: 2px;
        }

        .fallback-notice {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1) 0%, rgba(251, 191, 36, 0.05) 100%);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fallback-notice i {
            color: #fbbf24;
            font-size: 20px;
        }

        .fallback-notice p {
            color: #fbbf24;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .telegram-float {
                bottom: 20px;
                right: 20px;
                padding: 12px 20px;
                font-size: 14px;
            }

            .telegram-float span {
                display: none;
            }

            .telegram-float .telegram-icon {
                width: 36px;
                height: 36px;
            }

            .hero-glow::before {
                width: 300px;
                height: 300px;
            }

            header {
                padding: 0 10px;
            }

            header h1 {
                font-size: 1.8rem !important;
                line-height: 1.3;
            }

            header p {
                font-size: 0.9rem !important;
                padding: 0 10px;
                line-height: 1.5;
            }

            header .inline-flex {
                font-size: 0.75rem;
            }

            header .inline-flex span {
                display: inline;
            }

            .container {
                padding-left: 12px;
                padding-right: 12px;
            }

            .platform-icon {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .section-title {
                font-size: 1.3rem;
            }

            .glass-card {
                padding: 14px !important;
                border-radius: 16px !important;
            }

            .glass-card h3 {
                font-size: 1rem !important;
            }

            .version-badge {
                font-size: 10px;
                padding: 2px 8px;
            }

            .download-row {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 12px;
                padding: 12px !important;
            }

            .file-info {
                width: 100%;
                flex-wrap: wrap;
            }

            .file-info i {
                font-size: 16px;
            }

            .file-details {
                flex: 1;

            }

            .file-details span {
                font-size: 12px;
            }

            .arch-tag {

            }

            .download-actions {

            .mirror-badge {

            .download-btn, .original-btn {
                width: auto;

                min-width: 80px;
                padding: 8px 10px !important;
                font-size: 12px !important;
            }

            .download-btn .btn-text {
                display: inline;
            }

            .fallback-notice {
                padding: 12px 16px;
                flex-direction: column;
                text-align: center;
            }

            .fallback-notice p {
                font-size: 13px;
            }

            .highlight-platform::before {
                display: none;
            }

            footer {
                padding: 30px 15px;
            }

            footer p {
                font-size: 12px;
            }

            .back-to-top {
                right: 6px !important;
                top: 20px !important;

            .back-to-top div {
                width: 44px !important;

            .nav-btn {
                font-size: 12px !important;
                padding: 8px 16px !important;
            }

            .nav-btn i {
                font-size: 14px !important;
            }
        }
    </style>
</head>

                ]
            },
            'chen08209/FlClash': {
                tag_name: 'v0.8.92',
                assets: [
                    { name: 'FlClash-0.8.92-android-arm64-v8a.apk', browser_download_url: 'https://github.com/chen08209/FlClash/releases/download/v0.8.92/FlClash-0.8.92-android-arm64-v8a.apk' },
                    { name: 'FlClash-0.8.92-android-armeabi-v7a.apk', browser_download_url: 'https://github.com/chen08209/FlClash/releases/download/v0.8.92/FlClash-0.8.92-android-armeabi-v7a.apk' },
                    { name: 'FlClash-0.8.92-windows-amd64-setup.exe', browser_download_url: 'https://github.com/chen08209/FlClash/releases/download/v0.8.92/FlClash-0.8.92-windows-amd64-setup.exe' },
                    { name: 'FlClash-0.8.92-macos-arm64.dmg', browser_download_url: 'https://github.com/chen08209/FlClash/releases/download/v0.8.92/FlClash-0.8.92-macos-arm64.dmg' },
                    { name: 'FlClash-0.8.92-macos-amd64.dmg', browser_download_url: 'https://github.com/chen08209/FlClash/releases/download/v0.8.92/FlClash-0.8.92-macos-amd64.dmg' }
                ]
            },
            'clash-verge-rev/clash-verge-rev': {
                tag_name: 'v2.4.6',
                assets: [
                    { name: 'Clash.Verge_2.4.6_x64-setup.exe', browser_download_url: 'https://github.com/clash-verge-rev/clash-verge-rev/releases/download/v2.4.6/Clash.Verge_2.4.6_x64-setup.exe' },
                    { name: 'Clash.Verge_2.4.6_aarch64.dmg', browser_download_url: 'https://github.com/clash-verge-rev/clash-verge-rev/releases/download/v2.4.6/Clash.Verge_2.4.6_aarch64.dmg' },
                    { name: 'Clash.Verge_2.4.6_x64.dmg', browser_download_url: 'https://github.com/clash-verge-rev/clash-verge-rev/releases/download/v2.4.6/Clash.Verge_2.4.6_x64.dmg' }
                ]
            },
            'mihomo-party-org/clash-party': {
                tag_name: 'v1.9.2',
                assets: [
                    { name: 'clash-party-windows-1.9.2-x64-setup.exe', browser_download_url: 'https://github.com/mihomo-party-org/clash-party/releases/download/v1.9.2/clash-party-windows-1.9.2-x64-setup.exe' }
                ]
            }
        };

        const PLATFORM_NAMES = {
            android: 'Android',
            windows: 'Windows',
            macos: 'macOS',
            linux: 'Linux'
        };

        const PLATFORM_ICONS = {
            android: '<i class="fab fa-android"></i>',
            windows: '<i class="fab fa-windows"></i>',
            macos: '<i class="fab fa-apple"></i>',
            linux: '<i class="fab fa-linux"></i>'
        };

        const PLATFORM_ICON_CLASSES = {
            android: 'android-icon',
            windows: 'windows-icon',
            macos: 'macos-icon',
            linux: 'linux-icon'
        };

        function getMirrorUrl(githubUrl) {
            const mirror = MIRRORS[0];
            if (mirror.name === 'ghfast') {
                return mirror.url + githubUrl;
            }
            let path = githubUrl.replace('https://github.com/', '');
            
            if (mirror.prefix) {
                path = path.replace('github.com/', mirror.prefix);
            }
            
            return mirror.url + path;
        }

        function getArchTag(filename) {
            const lower = filename.toLowerCase();
            if (lower.includes('arm64') || lower.includes('aarch64') || lower.includes('v8a')) return 'ARMv8';
            if (lower.includes('armeabi') || lower.includes('armv7') || lower.includes('v7a')) return 'ARMv7';
            if (lower.includes('x64') || lower.includes('amd64') || lower.includes('x86_64')) return 'x64';
            if (lower.includes('x86') || lower.includes('i386') || lower.includes('i686')) return 'x86';
            if (lower.includes('arm')) return 'ARM';
            return '';
        }

        function getChipTag(filename) {
            const lower = filename.toLowerCase();
            if (lower.includes('arm64') || lower.includes('aarch64')) return 'Apple M芯片';
            if (lower.includes('x64') || lower.includes('amd64') || lower.includes('x86_64')) return 'Intel芯片';
            return '';
        }

        function isTargetPlatform(filename, platform) {
            const lower = filename.toLowerCase();
            
            switch(platform) {
                case 'android':
                    return lower.includes('android') || lower.includes('.apk');
                case 'windows':
                    return lower.includes('windows') || lower.includes('.exe') || lower.includes('setup');
                case 'macos':
                    return lower.includes('macos') || lower.includes('.dmg');
                case 'linux':
                    return lower.includes('linux') || lower.includes('.deb') || lower.includes('.rpm') || lower.includes('.AppImage') || lower.includes('.tar.gz');
                default:
                    return false;
            }
        }

        async function fetchRepoReleases(owner, name) {
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${name}/releases/latest`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`Failed to fetch ${owner}/${name}:`, error);
                return null;
            }
        }

        function groupByRepo(repos) {
            const grouped = {};
            repos.forEach(repo => {
                const key = `${repo.owner}/${repo.name}`;
                if (!grouped[key]) {
                    grouped[key] = {
                        owner: repo.owner,
                        name: repo.name,
                        fullName: key,
                        platforms: []
                    };
                }
                if (!grouped[key].platforms.includes(repo.platform)) {
                    grouped[key].platforms.push(repo.platform);
                }
            });
            return Object.values(grouped);
        }

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        }

        function getCurrentPlatform() {
            const userAgent = navigator.userAgent.toLowerCase();
            if (/android/i.test(userAgent)) return 'android';
            if (/iphone|ipad|ipod/i.test(userAgent)) return 'ios';
            if (/mac/i.test(userAgent) && !/windows/i.test(userAgent)) return 'macos';
            if (/linux/i.test(userAgent) && !/android/i.test(userAgent)) return 'linux';
            if (/windows/i.test(userAgent)) return 'windows';
            return null;
        }

        function getDeviceArchitecture() {
            if (navigator.userAgent.includes('ARM64') || navigator.userAgent.includes('arm64') || navigator.platform.includes('arm64') || navigator.platform.includes('ARM64')) {
                return 'arm64';
            }
            if (navigator.userAgent.includes('ARM') || navigator.userAgent.includes('arm') || navigator.platform.includes('arm') || navigator.platform.includes('ARM')) {
                return 'arm';
            }
            if (navigator.userAgent.includes('Win64') || navigator.userAgent.includes('x86_64') || navigator.platform.includes('x86_64') || navigator.platform.includes('Win64')) {
                return 'x64';
            }
            if (navigator.userAgent.includes('Win32') || navigator.userAgent.includes('x86') || navigator.platform.includes('x86') || navigator.platform.includes('Win32')) {
                return 'x86';
            }
            return null;
        }

        function isRecommendedDownload(platform, filename) {
            const currentPlatform = getCurrentPlatform();
            const currentArch = getDeviceArchitecture();
            
            if (currentPlatform !== platform) return false;
            
            const lower = filename.toLowerCase();
            
            switch (currentPlatform) {
                case 'android':
                    if (currentArch === 'arm64' && (lower.includes('arm64') || lower.includes('v8a'))) return true;
                    if (currentArch === 'arm' && (lower.includes('armeabi') || lower.includes('v7a'))) return true;
                    break;
                case 'windows':
                    if (currentArch === 'x64' && (lower.includes('x64') || lower.includes('amd64'))) return true;
                    if (currentArch === 'x86' && (lower.includes('x86') || lower.includes('i386'))) return true;
                    break;
                case 'macos':
                    if (currentArch === 'arm64' && (lower.includes('arm64') || lower.includes('aarch64'))) return true;
                    if (currentArch === 'x64' && (lower.includes('x64') || lower.includes('amd64'))) return true;
                    break;
                case 'linux':
                    if (currentArch === 'arm64' && (lower.includes('arm64') || lower.includes('aarch64'))) return true;
                    if (currentArch === 'x64' && (lower.includes('x64') || lower.includes('amd64'))) return true;
                    break;
            }
            
            return false;
        }

        function showRecommendedDownloads() {
            const currentPlatform = getCurrentPlatform();
            const currentArch = getDeviceArchitecture();
            
            if (!currentPlatform) return;
            
            let platformName = '设备';
            switch (currentPlatform) {
                case 'android': platformName = 'Android'; break;
                case 'windows': platformName = 'Windows'; break;
                case 'macos': platformName = 'macOS'; break;
                case 'linux': platformName = 'Linux'; break;
            }
            
            let archName = '';
            switch (currentArch) {
                case 'arm64': archName = 'ARM64'; break;
                case 'arm': archName = 'ARM'; break;
                case 'x64': archName = 'x64'; break;
                case 'x86': archName = 'x86'; break;
            }
            
            const recommendation = document.createElement('div');
            recommendation.className = 'recommendation-notice mb-10';
            recommendation.innerHTML = `
                <div class="bg-gradient-to-r from-[#00d9ff]/10 to-[#00ff88]/10 rounded-2xl p-6 border border-[#00d9ff]/30">
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-[#00d9ff] to-[#00ff88] flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-magic text-black font-bold"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold text-white mb-2">为您推荐</h3>
                            <p class="text-gray-400 mb-4">基于您的设备自动推荐最适合的下载版本</p>
                            <div class="flex flex-wrap gap-2">
                                <span class="px-3 py-1 rounded-full bg-white/10 text-sm">${platformName}</span>
                                ${archName ? `<span class="px-3 py-1 rounded-full bg-white/10 text-sm">${archName}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            const content = document.getElementById('content');
            if (content) {
                content.insertBefore(recommendation, content.firstChild);
            }
        }

        async function loadAllData() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            
            loading.classList.remove('hidden');
            content.classList.add('hidden');

            const repos = groupByRepo(REPOS);
            const allData = {};
            let useFallback = false;

            for (const repo of repos) {
                const release = await fetchRepoReleases(repo.owner, repo.name);
                if (release) {
                    allData[`${repo.owner}/${repo.name}`] = {
                        release: release,
                        platforms: repo.platforms
                    };
                }
            }

            if (Object.keys(allData).length === 0) {
                useFallback = true;
                for (const [key, data] of Object.entries(FALLBACK_DATA)) {
                    const [owner, name] = key.split('/');
                    const platform = REPOS.find(r => r.owner === owner && r.name === name)?.platform || 'android';
                    allData[key] = { release: data, platforms: [platform] };
                }
            }

            const currentPlatform = getCurrentPlatform();
            if (currentPlatform) {
                highlightPlatform(currentPlatform);
            }

            renderData(allData, useFallback);

            loading.classList.add('hidden');
            content.classList.remove('hidden');
        }

        function highlightPlatform(platform) {
            const platforms = ['android', 'windows', 'macos', 'linux'];
            platforms.forEach(p => {
                const section = document.getElementById(`${p}-section`);
                if (section) {
                    if (p === platform) {
                        section.classList.add('highlight-platform');
                    }
                }
            });
        }

        function renderData(allData, useFallback = false) {
            if (useFallback) {
                showFallbackNotice();
            }
            
            showRecommendedDownloads();

            const sections = {
                android: document.getElementById('android-section'),
                windows: document.getElementById('windows-section'),
                macos: document.getElementById('macos-section'),
                linux: document.getElementById('linux-section')
            };

            Object.keys(sections).forEach(platform => {
                sections[platform].innerHTML = '';
            });

            const platformOrder = ['android', 'windows', 'macos', 'linux'];

            platformOrder.forEach(platform => {
                const section = sections[platform];
                let platformData = [];

                REPOS.filter(r => r.platform === platform).forEach(repo => {
                    const key = `${repo.owner}/${repo.name}`;
                    const data = allData[key];
                    
                    if (data) {
                        const assets = data.release.assets.filter(asset => 
                            isTargetPlatform(asset.name, platform)
                        );
                        
                        if (assets.length > 0) {
                            const existing = platformData.find(p => p.fullName === key);
                            if (existing) {
                                existing.assets.push(...assets);
                            } else {
                                platformData.push({
                                    fullName: key,
                                    name: repo.name,
                                    version: data.release.tag_name,
                                    assets: assets
                                });
                            }
                        }
                    }
                });

                if (platformData.length > 0) {
                    let html = `
                        <div class="flex items-center gap-5 mb-8">
                            <div class="platform-icon ${PLATFORM_ICON_CLASSES[platform]}">
                                ${PLATFORM_ICONS[platform]}
                            </div>
                            <div>
                                <h2 class="text-3xl font-bold section-title">${PLATFORM_NAMES[platform]}</h2>
                                <p class="text-gray-500 text-sm mt-2">${platformData.length} 个客户端可用</p>
                            </div>
                        </div>
                        <div class="grid gap-5">
                    `;

                    platformData.forEach(project => {
                        const versionNum = project.version.replace('v', '');
                        
                        html += `
                            <div class="glass-card rounded-2xl p-6">
                                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-5">
                                    <div class="flex items-center gap-4">
                                        <h3 class="text-xl font-semibold text-white">${project.name}</h3>
                                        <span class="version-badge">v${versionNum}</span>
                                    </div>
                                </div>
                                <div class="grid gap-3">
                        `;

                        project.assets.forEach(asset => {
                            const archTag = platform === 'macos' ? getChipTag(asset.name) : getArchTag(asset.name);
                            const mirrorUrl = getMirrorUrl(asset.browser_download_url);
                            
                            let buttonText = '下载';
                            if (archTag) {
                                buttonText = `${archTag} | 下载`;
                            }

                            html += `
                                <div class="download-row flex items-center justify-between bg-black/30 rounded-xl p-4 hover:bg-black/40 transition">
                                    <div class="file-info flex items-center gap-3 flex-1 min-w-0">
                                        <i class="fas fa-file-archive text-gray-500 flex-shrink-0"></i>
                                        <div class="file-details flex flex-col min-w-0">
                                            <div class="flex items-center gap-2">
                                                <span class="text-sm text-gray-300 font-mono truncate">${asset.name}</span>
                                                ${isRecommendedDownload(platform, asset.name) ? `<span class="recommended-badge px-2 py-1 rounded text-xs font-semibold">推荐</span>` : ''}
                                            </div>
                                            ${archTag ? `<span class="arch-tag flex-shrink-0">${archTag}</span>` : ''}
                                        </div>
                                    </div>
                                    <div class="download-actions flex items-center gap-2 flex-shrink-0 ml-3">
                                        <span class="mirror-badge">国内</span>
                                        <a href="${mirrorUrl}" target="_blank" class="download-btn px-4 py-2 rounded-xl text-sm font-semibold text-black whitespace-nowrap">
                                            <i class="fas fa-download mr-1"></i><span class="btn-text">下载</span>
                                        </a>
                                        <a href="${asset.browser_download_url}" target="_blank" class="original-btn px-3 py-2 rounded-xl text-sm whitespace-nowrap">
                                            <i class="fab fa-github"></i>
                                        </a>
                                    </div>
                                </div>
                            `;
                        });

                        html += `
                                </div>
                            </div>
                        `;
                    });

                    html += '</div>';
                    section.innerHTML = html;
                }
            });
        }

        async function refreshAllData() {
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('fa-spin');
            
            await loadAllData();
            
            refreshIcon.classList.remove('fa-spin');
        }

        function copyQQ() {
            const qqNumber = document.getElementById('qqNumber').textContent;
            navigator.clipboard.writeText(qqNumber).then(() => {
                const button = document.querySelector('.copy-qq-btn');
                const originalIcon = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check text-green-400"></i>';
                setTimeout(() => {
                    button.innerHTML = originalIcon;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();
            
            // 回到顶部按钮逻辑
            const backToTopButton = document.getElementById('backToTop');
            
            if (backToTopButton) {
                // 强制显示按钮用于测试
                // backToTopButton.classList.remove('hidden');
                
                // 滚动事件监听
                window.addEventListener('scroll', function() {
                    if (window.pageYOffset > 100) {
                        backToTopButton.classList.remove('hidden');
                    } else {
                        backToTopButton.classList.add('hidden');
                    }
                });
                
                // 点击事件 - 同时支持点击和触摸
                backToTopButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                });
                
                // 触摸事件支持
                backToTopButton.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                });
            }
            
            // 导航按钮平滑滚动
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        window.scrollTo({
                            top: targetElement.offsetTop - 100,
                            behavior: 'smooth'
                        });
                    }
                });
            });
        });
    </script>
</body>
