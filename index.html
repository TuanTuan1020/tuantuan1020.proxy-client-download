<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理客户端下载中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 50%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradient-shift 3s ease infinite;
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 217, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .glow-cyan {
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.15);
        }
        
        .platform-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 24px;
        }
        
        .android-icon {
            background: linear-gradient(135deg, #3ddc84 0%, #00d9ff 100%);
        }
        
        .windows-icon {
            background: linear-gradient(135deg, #00a1f1 0%, #0078d4 100%);
        }
        
        .macos-icon {
            background: linear-gradient(135deg, #888 0%, #555 100%);
        }
        
        .linux-icon {
            background: linear-gradient(135deg, #fb9b14 0%, #e65100 100%);
        }
        
        .ios-icon {
            background: linear-gradient(135deg, #000 0%, #333 100%);
        }
        
        .download-btn {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 217, 255, 0.4);
        }
        
        .mirror-badge {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00d9ff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .section-title {
            position: relative;
            display: inline-block;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 2px;
        }
        
        .arch-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            color: #00d9ff;
        }
        
        .refresh-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-12 max-w-6xl">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-bold mb-4 gradient-text">代理客户端下载中心</h1>
            <p class="text-gray-400 text-lg mb-8">自动获取 GitHub 最新版本 | 提供国内镜像加速</p>
            <button onclick="refreshAllData()" class="refresh-btn px-6 py-2 rounded-full text-sm flex items-center gap-2 mx-auto">
                <i class="fas fa-sync-alt" id="refreshIcon"></i>
                <span>刷新数据</span>
            </button>
        </header>

        <div id="loading" class="flex justify-center items-center py-20">
            <div class="loading-spinner mr-3"></div>
            <span class="text-gray-400">正在获取最新版本信息...</span>
        </div>

        <div id="content" class="hidden">
            <div class="mb-12" id="android-section"></div>
            <div class="mb-12" id="windows-section"></div>
            <div class="mb-12" id="macos-section"></div>
            <div class="mb-12" id="linux-section"></div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-16 pb-8">
            <p>数据来源于 GitHub 官方 Releases | 仅供学习交流使用</p>
            <p class="mt-2">如遇下载问题，请尝试更换镜像源</p>
        </footer>
    </div>

    <script>
        const MIRRORS = [
            { name: 'ghproxy', url: 'https://mirror.ghproxy.com/', prefix: '' },
            { name: 'gitclone', url: 'https://gitclone.com/', prefix: 'github.com/' },
            { name: 'cfproxy', url: 'https://cfproxy.dev/', prefix: '' }
        ];

        const REPOS = [
            { owner: 'MetaCubeX', name: 'ClashMetaForAndroid', platform: 'android', icon: 'fab fa-android', iconClass: 'android-icon' },
            { owner: 'chen08209', name: 'FlClash', platform: 'android', icon: 'fab fa-android', iconClass: 'android-icon' },
            { owner: 'clash-verge-rev', name: 'clash-verge-rev', platform: 'windows', icon: 'fab fa-windows', iconClass: 'windows-icon' },
            { owner: 'chen08209', name: 'FlClash', platform: 'windows', icon: 'fab fa-windows', iconClass: 'windows-icon' },
            { owner: 'mihomo-party-org', name: 'clash-party', platform: 'windows', icon: 'fab fa-windows', iconClass: 'windows-icon' },
            { owner: 'clash-verge-rev', name: 'clash-verge-rev', platform: 'macos', icon: 'fab fa-apple', iconClass: 'macos-icon' },
            { owner: 'chen08209', name: 'FlClash', platform: 'macos', icon: 'fab fa-apple', iconClass: 'macos-icon' },
            { owner: 'MetaCubeX', name: 'ClashMetaForAndroid', platform: 'linux', icon: 'fab fa-linux', iconClass: 'linux-icon' },
            { owner: 'clash-verge-rev', name: 'clash-verge-rev', platform: 'linux', icon: 'fab fa-linux', iconClass: 'linux-icon' }
        ];

        const PLATFORM_NAMES = {
            android: 'Android',
            windows: 'Windows',
            macos: 'MacOS',
            linux: 'Linux'
        };

        const PLATFORM_ICONS = {
            android: '<i class="fab fa-android"></i>',
            windows: '<i class="fab fa-windows"></i>',
            macos: '<i class="fab fa-apple"></i>',
            linux: '<i class="fab fa-linux"></i>'
        };

        const PLATFORM_ICON_CLASSES = {
            android: 'android-icon',
            windows: 'windows-icon',
            macos: 'macos-icon',
            linux: 'linux-icon'
        };

        function getMirrorUrl(githubUrl) {
            const mirror = MIRRORS[0];
            let mirrorUrl = mirror.url;
            
            let path = githubUrl.replace('https://github.com/', '');
            
            if (mirror.prefix) {
                path = path.replace('github.com/', mirror.prefix);
            }
            
            return mirrorUrl + path;
        }

        function getArchTag(filename) {
            const lower = filename.toLowerCase();
            if (lower.includes('arm64') || lower.includes('aarch64') || lower.includes('v8a')) return 'ARMv8';
            if (lower.includes('armeabi') || lower.includes('armv7') || lower.includes('v7a')) return 'ARMv7';
            if (lower.includes('x64') || lower.includes('amd64') || lower.includes('x86_64')) return 'x64';
            if (lower.includes('x86') || lower.includes('i386') || lower.includes('i686')) return 'x86';
            if (lower.includes('arm')) return 'ARM';
            return '';
        }

        function getChipTag(filename) {
            const lower = filename.toLowerCase();
            if (lower.includes('arm64') || lower.includes('aarch64')) return 'Apple M芯片';
            if (lower.includes('x64') || lower.includes('amd64') || lower.includes('x86_64')) return 'Intel芯片';
            return '';
        }

        function isTargetPlatform(filename, platform) {
            const lower = filename.toLowerCase();
            
            switch(platform) {
                case 'android':
                    return lower.includes('android') || lower.includes('.apk');
                case 'windows':
                    return lower.includes('windows') || lower.includes('.exe') || lower.includes('setup');
                case 'macos':
                    return lower.includes('macos') || lower.includes('.dmg');
                case 'linux':
                    return lower.includes('linux') || lower.includes('.deb') || lower.includes('.rpm') || lower.includes('.AppImage') || lower.includes('.tar.gz');
                default:
                    return false;
            }
        }

        function getFileDisplayName(filename, repo, version) {
            const name = repo.name;
            const versionStr = version.replace('v', '');
            return `${name} ${versionStr}`;
        }

        async function fetchRepoReleases(owner, name) {
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${name}/releases/latest`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error(`Failed to fetch ${owner}/${name}:`, error);
                return null;
            }
        }

        function groupByRepo(repos) {
            const grouped = {};
            repos.forEach(repo => {
                const key = `${repo.owner}/${repo.name}`;
                if (!grouped[key]) {
                    grouped[key] = {
                        owner: repo.owner,
                        name: repo.name,
                        fullName: key,
                        platforms: []
                    };
                }
                if (!grouped[key].platforms.includes(repo.platform)) {
                    grouped[key].platforms.push(repo.platform);
                }
            });
            return Object.values(grouped);
        }

        async function loadAllData() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            
            loading.classList.remove('hidden');
            content.classList.add('hidden');

            const repos = groupByRepo(REPOS);
            const allData = {};

            for (const repo of repos) {
                const release = await fetchRepoReleases(repo.owner, repo.name);
                if (release) {
                    allData[`${repo.owner}/${repo.name}`] = {
                        release: release,
                        platforms: repo.platforms
                    };
                }
            }

            renderData(allData);

            loading.classList.add('hidden');
            content.classList.remove('hidden');
        }

        function renderData(allData) {
            const sections = {
                android: document.getElementById('android-section'),
                windows: document.getElementById('windows-section'),
                macos: document.getElementById('macos-section'),
                linux: document.getElementById('linux-section')
            };

            Object.keys(sections).forEach(platform => {
                sections[platform].innerHTML = '';
            });

            const platformOrder = ['android', 'windows', 'macos', 'linux'];

            platformOrder.forEach(platform => {
                const section = sections[platform];
                let platformData = [];

                REPOS.filter(r => r.platform === platform).forEach(repo => {
                    const key = `${repo.owner}/${repo.name}`;
                    const data = allData[key];
                    
                    if (data) {
                        const assets = data.release.assets.filter(asset => 
                            isTargetPlatform(asset.name, platform)
                        );
                        
                        if (assets.length > 0) {
                            const existing = platformData.find(p => p.fullName === key);
                            if (existing) {
                                existing.assets.push(...assets);
                            } else {
                                platformData.push({
                                    fullName: key,
                                    name: repo.name,
                                    version: data.release.tag_name,
                                    assets: assets
                                });
                            }
                        }
                    }
                });

                if (platformData.length > 0) {
                    let html = `
                        <div class="flex items-center gap-4 mb-6">
                            <div class="platform-icon ${PLATFORM_ICON_CLASSES[platform]}">
                                ${PLATFORM_ICONS[platform]}
                            </div>
                            <h2 class="text-2xl font-bold section-title">${PLATFORM_NAMES[platform]}</h2>
                        </div>
                        <div class="grid gap-4">
                    `;

                    platformData.forEach(project => {
                        html += `
                            <div class="glass-card rounded-2xl p-6 glow-cyan">
                                <div class="flex items-center justify-between mb-4">
                                    <h3 class="text-xl font-semibold">${project.name} ${project.version}</h3>
                                </div>
                                <div class="grid gap-3">
                        `;

                        project.assets.forEach(asset => {
                            const archTag = platform === 'macos' ? getChipTag(asset.name) : getArchTag(asset.name);
                            const mirrorUrl = getMirrorUrl(asset.browser_download_url);
                            
                            let buttonText = '点此下载';
                            if (archTag) {
                                buttonText = `${archTag}|点此下载`;
                            }

                            html += `
                                <div class="flex items-center justify-between bg-black/20 rounded-lg p-3">
                                    <div class="flex items-center gap-3">
                                        <span class="text-sm text-gray-300 font-mono">${asset.name}</span>
                                        ${archTag ? `<span class="arch-tag">${archTag}</span>` : ''}
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="mirror-badge">国内镜像</span>
                                        <a href="${mirrorUrl}" target="_blank" class="download-btn px-4 py-2 rounded-lg text-sm font-medium text-black">
                                            <i class="fas fa-download mr-1"></i>${buttonText}
                                        </a>
                                        <a href="${asset.browser_download_url}" target="_blank" class="px-3 py-2 rounded-lg text-sm bg-white/10 hover:bg-white/20 transition">
                                            <i class="fab fa-github mr-1"></i>原始
                                        </a>
                                    </div>
                                </div>
                            `;
                        });

                        html += `
                                </div>
                            </div>
                        `;
                    });

                    html += '</div>';
                    section.innerHTML = html;
                }
            });
        }

        async function refreshAllData() {
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('fa-spin');
            
            await loadAllData();
            
            refreshIcon.classList.remove('fa-spin');
        }

        document.addEventListener('DOMContentLoaded', loadAllData);
    </script>
</body>
</html>
